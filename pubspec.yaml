name: ghasaq
description: "غسق — مواقيت الصلاة لأجهزة Android TV"
version: 1.0.8+16
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.5+1

  # Persistent key-value storage
  shared_preferences: ^2.5.4

  # Audio playback for Adhan
  audioplayers: ^6.5.1

  # Hijri calendar conversion
  hijri: ^3.0.0

  # Date/time formatting
  intl: ^0.20.2

  # Arabic fonts (Cairo)
  

  # App storage path — used by SqliteDbInitializer to locate the DB file
  path_provider: ^2.1.5

  # Keep screen awake during app usage
  wakelock_plus: ^1.2.9

  # SQLite — prayer times storage (replaces bundled CSVs)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Lottie animations (splash screen)
  lottie: ^3.3.1

  # Compass (magnetometer + accelerometer)
  sensors_plus: ^6.0.0
  # GPS for Qibla bearing calculation
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # Notification scheduling is now handled by the native Kotlin engine in
  # android/app/src/main/kotlin/com/ghasaq/app/notifications/ — no Flutter
  # plugin is required for the mobile notification path. The timezone package
  # is still needed by lib/features/prayer/domain/prayer_time_zone.dart.
  timezone: ^0.9.4

  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.0
  firebase_analytics: ^11.4.0
  firebase_remote_config: ^5.4.0

  # Reads installed app version (versionCode / build number) at runtime.
  package_info_plus: ^8.1.0

  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  adhan_dart: ^1.2.0

  # Pick audio files from device storage for custom adhan sounds (mobile only)
  file_picker: ^8.1.4

  # Open URLs (Play Store rating link)
  url_launcher: ^6.3.1

  # QR code widget for TV rating dialog
  qr_flutter: ^4.1.0

  # Google Play In-App Updates API
  in_app_update: ^4.2.3

  # Home screen widget (Android) — bridge to AppWidgetProvider
  home_widget: ^0.7.0

  # Quran metadata helpers (getPageData, getJuzNumber, getPageNumber).
  # Rendering uses page images from android.quran.com — see
  # quran_page_image_urls.dart.
  quran: ^1.4.1

  # Persistent disk cache for the Mushaf page images pulled from
  # https://files.quran.app/hafs/madani/width_X/page{NNN}.png. Each PNG
  # is ~30-60 KB at 1024px wide; the full Mushaf cache is ~25 MB.
  cached_network_image: ^3.4.1

  # Zip extraction for the ayahinfo SQLite bundle (per-glyph bounding
  # boxes used by tap-to-play). The 2.2 MB zip ships as a single .db
  # inside.
  archive: ^4.0.9

  # SVG rendering — currently powers the tinted Tasbih icon used in
  # the Today bento + the Adhkar entry card. The SVG ships as a
  # single asset and we apply a ColorFilter at runtime so it picks up
  # the active theme's accent colour.
  flutter_svg: ^2.0.10+1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  injectable_generator: ^2.12.1
  sqflite_common_ffi: ^2.4.0+2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/Icon.png
  web:
    generate: true
    image_path: assets/images/Icon.png

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/audio/adhan.mp3
    - assets/audio/dua.mp3
    - assets/audio/iqama.mp3
    - assets/audio/adhan2.mp3
    - assets/audio/Fajr.mp3
    - assets/audio/Dhuhr.mp3
    - assets/audio/Asr.mp3
    - assets/audio/Maghrib.mp3
    - assets/audio/Isha.mp3
    - assets/audio/adhkar.json
    - assets/audio/dua/
    - assets/adhkar/adhkar_text.json
    - assets/db_city_lists.json
    - assets/world_cities.json
    - assets/db_countries.json
    - assets/animations/
    - assets/quran/
    # Bundled fallback for the remote occasions catalog. Shipped with the
    # APK so a first-launch user with no network still sees Hijri events.
    - assets/occasions/occasions_default.json
    # Tinted Tasbih icon used by Today bento + Adhkar entry card.
    - assets/tasbih.svg
    # Kaaba image used by the Qibla compass marker + center label.
    - assets/kaaba.png
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700
    - family: Kufi
      fonts:
        - asset: assets/fonts/NotoKufiArabic/NotoKufiArabic-Medium.ttf
    - family: Beiruti
      fonts:
        - asset: assets/fonts/Beiruti/Beiruti-Regular.ttf
        - asset: assets/fonts/Beiruti/Beiruti-Bold.ttf
          weight: 700
    - family: Rubik
      fonts:
        - asset: assets/fonts/Rubik/Rubik-Regular.ttf
        - asset: assets/fonts/Rubik/Rubik-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rubik/Rubik-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
    # Amiri Quran — Uthmanic Mushaf script for short Quran-text
    # previews (resume card, Today bento, theme picker). Reader pages
    # themselves are Madinah PNGs from files.quran.app, not this font.
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran/AmiriQuran-Regular.ttf
    # Quran.com surah-name font (`sura_names` v1). Uses OpenType ligatures:
    # the 3-digit zero-padded chapter id ("001", "002", …, "114") collapses
    # into a single calligraphic medallion glyph for that surah. The
    # literal "surah" string renders the decorative word سورة ().
    # Licensed via quran.com-frontend-next (MIT) — see project README.
    - family: SurahNames
      fonts:
        - asset: assets/fonts/SurahNames/SurahNames.ttf
