name: salah_tv
description: Islamic prayer times display for Android TV / TV Box
version: 1.0.6+6
publish_to: none

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.5+1

  # Persistent key-value storage
  shared_preferences: ^2.5.4

  # Audio playback for Adhan
  audioplayers: ^6.5.1

  # Hijri calendar conversion
  hijri: ^3.0.0

  # Date/time formatting
  intl: ^0.20.2

  # Arabic fonts (Cairo)
  

  # App storage path — used by SqliteDbInitializer to locate the DB file
  path_provider: ^2.1.5

  # Keep screen awake during app usage
  wakelock_plus: ^1.2.9

  # HTTP requests for Quran API
  http: ^1.2.2

  # SQLite — prayer times storage (replaces bundled CSVs)
  sqflite: ^2.4.2
  path: ^1.9.1

  # Makkah live stream
  video_player: ^2.9.3
  dio: ^5.9.2
  package_info_plus: ^9.0.0
  install_plugin_v2: ^1.0.0
  flutter_bloc: ^9.1.1
  dartz: ^0.10.1
  get_it: ^9.2.1
  injectable: ^2.7.1+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  injectable_generator: ^2.12.1
  sqflite_common_ffi: ^2.4.0+2

flutter:
  uses-material-design: true
  assets:
    - assets/audio/adhan.mp3
    - assets/audio/dua.mp3
    - assets/audio/iqama.mp3
    - assets/audio/adhan2.mp3
    - assets/audio/adhan3.mp3
    - assets/audio/Fajr.mp3
    - assets/audio/Dhuhr.mp3
    - assets/audio/Asr.mp3
    - assets/audio/Maghrib.mp3
    - assets/audio/Isha.mp3
    - assets/prayer_times.db
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo/Cairo-Bold.ttf
          weight: 700
    - family: Kufi
      fonts:
        - asset: assets/fonts/NotoKufiArabic/NotoKufiArabic-Medium.ttf
    - family: Beiruti
      fonts:
        - asset: assets/fonts/Beiruti/Beiruti-Regular.ttf
        - asset: assets/fonts/Beiruti/Beiruti-Bold.ttf
          weight: 700
