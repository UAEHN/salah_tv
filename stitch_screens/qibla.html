<style>body {
    background-color: #0c0c0c;
    /* Deeper charcoal for Dark Oasis */
    color: #fef9ef;
    font-family: "Plus Jakarta Sans", "IBM Plex Sans Arabic", sans-serif;
    overflow-x: hidden
    }
.neomorph-inset {
    box-shadow: inset 8px 8px 16px rgba(0, 0, 0, 0.4), inset -8px -8px 16px rgba(255, 255, 255, 0.05)
    }
.neomorph-flat {
    box-shadow: 12px 12px 24px rgba(0, 0, 0, 0.5), -12px -12px 24px rgba(255, 255, 255, 0.02)
    }
.compass-ring {
    background: radial-gradient(circle at 30% 30%, #1a1a1a 0%, #0c0c0c 100%)
    }
.qibla-glow {
    filter: drop-shadow(0 0 15px rgba(64, 224, 208, 0.4))
    }
.arabic-pattern {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCsAl7os_4uSLsH9SXrTFBiR5g4BiOJXtBvzRXYE00-3WJC184IRX6jUH50iZzPOczxWBYeiAf2xWrSLIbUCtDPUfeP0xv96K8INrznzn3ot0CsxmycdcnqPuS8QZy7dIgmEgpIMkM4WuF2D0QZsXcobZV_I3vXFD9vGyPHkjlmXgtnpGQbD8-P6zh4eMsl_4Wh5JGwnImoILBdvl45AzzRIbVkjzGOetehcnU5C5UMkkVNxgpAqwIX_-ndJRIq5Iyk7oy6hApIh6Q);
    opacity: 0.07
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-between pb-32">
<!-- Top AppBar Strategy -->
<header class="w-full top-0 px-6 pt-8 flex items-center justify-between z-10">
<div class="flex items-center gap-2 bg-stone-900/50 backdrop-blur-md px-4 py-2 rounded-full border border-white/5">
<span class="material-symbols-outlined text-primary-container text-lg">location_on</span>
<span class="font-arabic text-sm font-medium tracking-wide">لندن، المملكة المتحدة</span>
</div>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-stone-900/50 backdrop-blur-md border border-white/5 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white" data-icon="menu">menu</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md px-6 flex flex-col items-center justify-center gap-12">
<!-- Status Indicator -->
<div class="text-center space-y-2">
<h2 class="font-arabic text-2xl font-bold text-primary-container qibla-glow">أنت تشير باتجاه القبلة</h2>
<p class="font-arabic text-stone-400 text-sm tracking-widest opacity-80 uppercase">Aligned with Kaaba</p>
</div>
<!-- Central Digital Compass -->
<div class="relative w-80 h-80 flex items-center justify-center">
<!-- Outermost Decorative Ring -->
<div class="absolute inset-0 rounded-full neomorph-flat border border-white/5"></div>
<!-- Main Compass Disk -->
<div class="absolute inset-4 rounded-full compass-ring neomorph-inset flex items-center justify-center overflow-hidden">
<!-- Geometric Pattern Overlay -->
<div class="absolute inset-0 arabic-pattern"></div>
<!-- Degree Marks (Simulated) -->
<div class="absolute inset-4 rounded-full border border-white/5 border-dashed opacity-20"></div>
<!-- Compass Face -->
<div class="relative w-full h-full flex items-center justify-center">
<!-- Needle -->
<div class="absolute w-1.5 h-full py-8 flex flex-col justify-between items-center rotate-[145deg] transition-transform duration-700 ease-out">
<!-- Qibla Pointer -->
<div class="relative group">
<div class="w-6 h-10 bg-gradient-to-b from-primary-container to-primary rounded-t-full shadow-[0_0_20px_rgba(64,224,208,0.5)]"></div>
<div class="absolute -top-12 left-1/2 -translate-x-1/2 flex flex-col items-center">
<span class="material-symbols-outlined text-primary-container text-3xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mosque</span>
</div>
</div>
<!-- South Pointer -->
<div class="w-4 h-4 bg-stone-800 rounded-full border border-white/10"></div>
</div>
<!-- Center Hub -->
<div class="z-10 w-24 h-24 rounded-full bg-stone-900 shadow-2xl flex flex-col items-center justify-center border border-white/10 backdrop-blur-xl">
<span class="font-body text-3xl font-extrabold text-white leading-none">145°</span>
<span class="font-arabic text-[10px] text-stone-500 font-bold uppercase tracking-tighter mt-1">SE</span>
</div>
</div>
</div>
<!-- Direction Indicators (N, E, S, W) -->
<div class="absolute inset-0 pointer-events-none">
<span class="absolute top-8 left-1/2 -translate-x-1/2 text-stone-600 font-bold text-xs">N</span>
<span class="absolute bottom-8 left-1/2 -translate-x-1/2 text-stone-600 font-bold text-xs">S</span>
<span class="absolute right-8 top-1/2 -translate-y-1/2 text-stone-600 font-bold text-xs">E</span>
<span class="absolute left-8 top-1/2 -translate-y-1/2 text-stone-600 font-bold text-xs">W</span>
</div>
</div>
<!-- Information Cards (Bento Style) -->
<div class="grid grid-cols-2 gap-4 w-full">
<div class="p-5 rounded-xl bg-stone-900/40 backdrop-blur-sm border border-white/5 flex flex-col items-center justify-center text-center">
<span class="text-stone-500 font-arabic text-xs mb-2">المسافة للكعبة</span>
<div class="flex items-baseline gap-1">
<span class="text-white font-body text-xl font-bold">4,520</span>
<span class="text-primary-container font-arabic text-sm">كم</span>
</div>
</div>
<div class="p-5 rounded-xl bg-stone-900/40 backdrop-blur-sm border border-white/5 flex flex-col items-center justify-center text-center">
<span class="text-stone-500 font-arabic text-xs mb-2">الانحراف</span>
<div class="flex items-baseline gap-1">
<span class="text-white font-body text-xl font-bold">12.4</span>
<span class="text-secondary font-arabic text-sm">درجة</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Execution -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end bg-[#fef9ef]/80 dark:bg-stone-900/80 backdrop-blur-xl rounded-t-[3rem] px-8 pb-6 pt-2 shadow-[0_-8px_16px_rgba(29,28,22,0.06)] dark:shadow-none">
<!-- Inactive: Prayer -->
<a class="flex flex-col items-center justify-center text-[#1d1c16]/60 dark:text-stone-400 px-6 py-3 hover:bg-stone-100 dark:hover:bg-stone-800 rounded-[2rem] active:scale-90 transition-transform duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="prayer_times">prayer_times</span>
<span class="font-plus-jakarta-sans text-[11px] font-bold uppercase tracking-[0.05rem]">Prayer</span>
</a>
<!-- Active: Qibla -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#006a62] to-[#40e0d0] text-white rounded-[2rem] px-6 py-3 shadow-lg active:scale-90 transition-transform duration-300" href="#">
<span class="material-symbols-outlined mb-1" data-icon="explore" data-weight="fill" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-plus-jakarta-sans text-[11px] font-bold uppercase tracking-[0.05rem]">Qibla</span>
</a>
</nav>
<!-- Decorative Background Elements -->
<div class="fixed top-0 right-0 w-96 h-96 bg-primary/10 blur-[120px] rounded-full -z-10 translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 w-64 h-64 bg-secondary/5 blur-[100px] rounded-full -z-10 -translate-x-1/2 translate-y-1/2"></div>
</body></html>
