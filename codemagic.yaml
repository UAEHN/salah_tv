# Codemagic CI — بناء نسخة iOS غير موقّعة (.ipa) للتثبيت الجانبي عبر
# Sideloadly / AltStore باستخدام Apple ID مجاني. لا يتطلب اشتراك Apple
# Developer ولا شهادات توقيع في هذه المرحلة (--no-codesign).
#
# بعد البناء: حمّل app.ipa من تبويب Artifacts، ثم وقّعه وثبّته بـ Sideloadly.
workflows:
  ios-unsigned-ipa:
    name: iOS unsigned IPA (sideload)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Build unsigned iOS app
        script: flutter build ios --release --no-codesign
      - name: Package Runner.app into an .ipa
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r app.ipa Payload >/dev/null
          rm -rf Payload
    artifacts:
      - build/ios/iphoneos/app.ipa
